<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pinoolavender V2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        :root { --accent: #a020f0; --bg: #0a0a0a; --card: #151515; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }

        @keyframes pulseSoft {
            0% { box-shadow: 0 0 0 0 rgba(160,32,240,0.5); }
            70% { box-shadow: 0 0 0 8px rgba(160,32,240,0); }
            100% { box-shadow: 0 0 0 0 rgba(160,32,240,0); }
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .header-brand { position: absolute; top: 25px; left: 25px; display: flex; flex-direction: column; gap: 8px; z-index: 10; }
        .profile-area { display: flex; align-items: center; gap: 15px; }
        .pfp-container { position: relative; display: flex; align-items: center; }
        .pfp-mini { width: 50px; height: 50px; border-radius: 50%; border: 1.5px solid #333; object-fit: cover; }
        .status-dot { position: absolute; bottom: 2px; right: 2px; width: 10px; height: 10px; background: var(--accent); border-radius: 50%; border: 2px solid var(--bg); animation: pulseSoft 2s infinite; }
        .store-info { display: flex; flex-direction: column; }
        .store-name { font-size: 1.3rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; color: #fff; }
        .v2-tag { font-size: 0.65rem; opacity: 0.4; font-weight: 400; margin-top: -2px; color: var(--accent); }
        .header-line { width: 200px; height: 2px; background: linear-gradient(to right, var(--accent), transparent); margin-top: 5px; border-radius: 2px; }

        .admin-tiny-btn {
            position: fixed; top: 18px; right: 18px;
            background: rgba(160,32,240,0.08); border: 1px solid rgba(160,32,240,0.2);
            color: rgba(255,255,255,0.3); font-size: 11px; padding: 5px 10px;
            border-radius: 20px; cursor: pointer; z-index: 10; transition: 0.3s; letter-spacing: 0.5px;
        }
        .admin-tiny-btn:hover { background: rgba(160,32,240,0.2); color: rgba(255,255,255,0.7); }

        .container { max-width: 650px; margin: 160px auto 50px; padding: 20px; text-align: center; position: relative; }
        .title-wrapper { position: relative; display: inline-block; margin-bottom: 45px; }
        .monet-title { font-size: 3.5rem; font-weight: 800; letter-spacing: -3px; color: #fff; margin: 0; display: inline-block; }

        .red-video-badge {
            position: absolute; top: -65px; left: 50%; transform: translateX(-50%);
            width: 70px; height: 70px; border-radius: 12px; overflow: hidden;
            border: 2px solid #ff0000; box-shadow: 0 0 15px rgba(255,0,0,0.8);
            background: #000; z-index: 20;
        }
        .red-video-badge video { width: 100%; height: 100%; object-fit: cover; display: block; }

        .search-box {
            width: 100%; padding: 18px 28px 18px 55px;
            background: var(--card); border: 1px solid #222;
            border-radius: 15px; color: #fff; font-size: 1rem;
            outline: none; transition: 0.3s; box-sizing: border-box;
        }
        .search-box:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(160,32,240,0.2); }
        .search-wrapper { position: relative; width: 100%; }
        .search-icon {
            position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
            color: #888; font-size: 1.2rem; pointer-events: none; z-index: 2;
        }

        .script-list { margin-top: 40px; text-align: left; }
        .script-card { background: var(--card); padding: 25px; border-radius: 18px; margin-bottom: 25px; border: 1px solid #222; transition: 0.3s; }
        .script-card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .script-card h3 { margin: 0 0 10px 0; color: var(--accent); font-size: 1.3rem; display: flex; align-items: center; gap: 10px; }
        .script-card .script-meta { font-size: 0.75rem; color: #777; margin-bottom: 12px; display: flex; gap: 15px; flex-wrap: wrap; }
        .script-card .script-desc { font-size: 0.9rem; color: #bbb; margin: 12px 0; line-height: 1.5; }
        .preview-img { width: 100%; border-radius: 12px; margin-top: 15px; border: 1px solid #333; }

        .btn-action { background: linear-gradient(135deg, var(--accent), #ff6b9d); color: #fff; border: none; padding: 12px 28px; border-radius: 40px; font-weight: 800; cursor: pointer; margin-top: 15px; transition: 0.3s; display: inline-flex; align-items: center; gap: 10px; font-size: 0.9rem; }
        .btn-action:hover { transform: scale(1.03); box-shadow: 0 5px 20px rgba(160,32,240,0.4); }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 98; backdrop-filter: blur(4px); }

        .admin-sidebar {
            display: none; position: fixed; top: 0; right: 0;
            width: 320px; max-width: 92vw; height: 100vh;
            background: linear-gradient(135deg, #0a0a0f, #0f0f1a);
            border-left: 2px solid var(--accent);
            z-index: 200; overflow-y: auto;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            flex-direction: column;
        }
        .admin-sidebar.open { display: flex; animation: slideIn 0.25s ease; }

        .sidebar-header {
            padding: 13px 14px; border-bottom: 1px solid #1e1e1e;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; background: #0a0a0f; z-index: 5;
        }
        .sidebar-header h2 { color: var(--accent); margin: 0; font-size: 0.95rem; display: flex; align-items: center; gap: 7px; }
        .sidebar-header-btns { display: flex; gap: 7px; align-items: center; }

        .close-sidebar {
            background: rgba(255,255,255,0.05); border: 1px solid #333;
            color: #aaa; font-size: 12px; cursor: pointer;
            padding: 5px 9px; border-radius: 8px; transition: 0.2s;
        }
        .close-sidebar:hover { color: #fff; background: rgba(255,255,255,0.1); }

        .logout-sidebar-btn {
            background: rgba(255,60,60,0.1); border: 1px solid rgba(255,60,60,0.3);
            color: #ff6666; font-size: 12px; cursor: pointer;
            padding: 5px 9px; border-radius: 8px; transition: 0.2s;
            display: flex; align-items: center; gap: 5px;
        }
        .logout-sidebar-btn:hover { background: rgba(255,60,60,0.25); color: #fff; }

        .sidebar-body { padding: 12px 13px; flex: 1; }

        .stat-cards { display: grid; grid-template-columns: repeat(3,1fr); gap: 7px; margin-bottom: 14px; }
        .stat-card { background: rgba(255,255,255,0.04); border-radius: 10px; padding: 9px 5px; text-align: center; border: 1px solid rgba(160,32,240,0.2); }
        .stat-card i { font-size: 15px; color: var(--accent); margin-bottom: 4px; display: block; }
        .stat-card .stat-value { font-size: 17px; font-weight: 800; color: #fff; }
        .stat-card .stat-label { font-size: 9px; color: #777; margin-top: 2px; }

        .section-title { font-size: 0.7rem; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 1px; margin: 13px 0 7px; display: flex; align-items: center; gap: 6px; }

        .admin-form input, .admin-form textarea, .admin-form select {
            width: 100%; padding: 8px 10px; margin: 3px 0;
            background: #111; border: 1px solid #2a2a2a;
            color: #fff; border-radius: 8px; box-sizing: border-box;
            font-family: inherit; font-size: 12px;
        }
        .admin-form textarea { resize: vertical; }
        .admin-form .btn-action { width: 100%; margin-top: 8px; padding: 9px; font-size: 12px; justify-content: center; }

        .admin-list-item {
            background: rgba(255,255,255,0.03); border-radius: 9px;
            padding: 9px 11px; margin-bottom: 7px; border-left: 2px solid var(--accent);
        }
        .admin-list-item h4 { margin: 0 0 3px 0; color: var(--accent); font-size: 0.82rem; }
        .admin-list-item p { margin: 2px 0; font-size: 10px; color: #888; }
        .item-actions { display: flex; gap: 5px; margin-top: 7px; flex-wrap: wrap; }

        .btn-sm { border: none; cursor: pointer; padding: 3px 9px; border-radius: 6px; font-size: 11px; transition: 0.2s; }
        .btn-edit { background: rgba(160,32,240,0.15); color: var(--accent); }
        .btn-edit:hover { background: rgba(160,32,240,0.4); color: #fff; }
        .btn-delete { background: rgba(255,0,0,0.12); color: #ff5555; }
        .btn-delete:hover { background: rgba(255,0,0,0.35); color: #fff; }
        .btn-link { background: rgba(255,255,255,0.06); color: #aaa; }
        .btn-link:hover { background: rgba(255,255,255,0.12); color: #fff; }

        .role-badge {
            display: inline-block; font-size: 9px; font-weight: 700;
            padding: 2px 6px; border-radius: 8px; margin-left: 5px;
            vertical-align: middle; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .role-ceo { background: rgba(160,32,240,0.2); color: var(--accent); border: 1px solid rgba(160,32,240,0.35); }
        .role-team { background: rgba(255,180,0,0.12); color: #ffb400; border: 1px solid rgba(255,180,0,0.25); }

        input, textarea, select { outline: none; }
        input:focus, textarea:focus, select:focus { border-color: var(--accent) !important; }

        .modal-box {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #111; padding: 22px; border-radius: 18px;
            border: 1px solid var(--accent); z-index: 300;
            width: 90%; max-width: 380px; box-sizing: border-box;
        }
        .modal-box h3 { margin-top: 0; text-align: center; color: var(--accent); font-size: 0.95rem; margin-bottom: 14px; }
        .modal-box input, .modal-box select, .modal-box textarea {
            width: 100%; padding: 9px 10px; margin: 4px 0;
            background: #1a1a1a; border: 1px solid #2a2a2a;
            color: #fff; border-radius: 8px; box-sizing: border-box; font-size: 12px; font-family: inherit;
        }
        .modal-box textarea { resize: vertical; }
        .modal-box .btn-action { width: 100%; margin-top: 10px; padding: 10px; font-size: 12px; justify-content: center; }
        .modal-box .btn-cancel {
            background: none; border: 1px solid #2a2a2a; margin-top: 7px;
            width: 100%; border-radius: 8px; padding: 8px; color: #888;
            cursor: pointer; font-size: 12px; transition: 0.2s;
        }
        .modal-box .btn-cancel:hover { border-color: #555; color: #fff; }

        .empty-state { text-align: center; padding: 50px 20px; background: rgba(0,0,0,0.3); border-radius: 20px; }
        .empty-state i { font-size: 40px; color: #333; margin-bottom: 12px; display: block; }
        .empty-state p { color: #555; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="header-brand">
    <div class="profile-area">
        <div class="pfp-container">
            <img src="https://i.ibb.co.com/nsLRnhSx/pinooo.png" class="pfp-mini" alt="CEO">
            <div class="status-dot"></div>
        </div>
        <div class="store-info">
            <div class="store-name">pinoolavender</div>
            <div class="v2-tag">website share monetloader</div>
        </div>
    </div>
    <div class="header-line"></div>
</div>

<button class="admin-tiny-btn" id="adminLoginBtn" onclick="showLogin()">⚙</button>

<div class="container">
    <div class="title-wrapper">
        <div class="red-video-badge">
            <video autoplay loop muted playsinline>
                <source src="video.mp4" type="video/mp4">
            </video>
        </div>
        <h1 class="monet-title">monetloader</h1>
    </div>
    <div class="search-wrapper">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="searchInput" class="search-box" placeholder="Cari file..." onkeyup="filterScripts()">
    </div>
    <div id="display-list" class="script-list"></div>
</div>

<div id="overlay" class="overlay"></div>

<div id="loginModal" class="modal-box">
    <h3><i class="fas fa-lock"></i> ADMIN LOGIN</h3>
    <input type="text" id="admU" placeholder="Username">
    <input type="password" id="admP" placeholder="Password">
    <button class="btn-action" onclick="attemptLogin()"><i class="fas fa-sign-in-alt"></i> VERIFY</button>
    <button class="btn-cancel" onclick="closeLoginModal()">Batal</button>
</div>

<div id="adminSidebar" class="admin-sidebar">
    <div class="sidebar-header">
        <h2 id="sidebarTitle"><i class="fas fa-crown"></i> CEO PANEL</h2>
        <div class="sidebar-header-btns">
            <button class="logout-sidebar-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
            <button class="close-sidebar" onclick="closeSidebar()"><i class="fas fa-times"></i></button>
        </div>
    </div>
    <div class="sidebar-body">

        <div id="blockStats">
            <div class="stat-cards">
                <div class="stat-card">
                    <i class="fas fa-download"></i>
                    <div class="stat-value" id="statDownloads">0</div>
                    <div class="stat-label">Download</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-link"></i>
                    <div class="stat-value" id="statLinks">0</div>
                    <div class="stat-label">Link</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-file"></i>
                    <div class="stat-value" id="statFiles">0</div>
                    <div class="stat-label">File</div>
                </div>
            </div>
        </div>

        <div class="admin-form">
            <div class="section-title"><i class="fas fa-upload"></i> Share File Baru</div>
            <input type="text" id="shareFileName" placeholder="Nama File">
            <input type="text" id="shareAuthor" placeholder="Author">
            <input type="text" id="sharePlatform" placeholder="Platform (Windows/Android/iOS)">
            <input type="text" id="shareCommand" placeholder="Command">
            <textarea id="shareFitur" rows="2" placeholder="Fitur-fitur..."></textarea>
            <input type="text" id="shareLink" placeholder="Link Download">
            <input type="text" id="sharePreview" placeholder="URL Preview Gambar (Imgbb)">
            <button class="btn-action" onclick="uploadAdminShare()"><i class="fas fa-paper-plane"></i> Share</button>
        </div>

        <div id="blockAdminList"></div>

        <div>
            <div class="section-title"><i class="fas fa-history"></i> File Dishare</div>
            <div id="adminFileList"></div>
        </div>

    </div>
</div>

<div id="editModal" class="modal-box">
    <h3><i class="fas fa-edit"></i> EDIT FILE</h3>
    <input type="hidden" id="editFileId">
    <input type="text" id="editFileName" placeholder="Nama File">
    <input type="text" id="editAuthor" placeholder="Author">
    <input type="text" id="editPlatform" placeholder="Platform">
    <input type="text" id="editCommand" placeholder="Command">
    <textarea id="editFitur" rows="2" placeholder="Fitur-fitur"></textarea>
    <input type="text" id="editLink" placeholder="Link Download">
    <input type="text" id="editPreview" placeholder="URL Preview Gambar">
    <button class="btn-action" onclick="saveEdit()"><i class="fas fa-save"></i> Simpan</button>
    <button class="btn-cancel" onclick="closeModal('editModal')">Batal</button>
</div>

<div id="addAdminModal" class="modal-box">
    <h3><i class="fas fa-user-plus"></i> ADD ADMIN</h3>
    <input type="text" id="newAdminUser" placeholder="Username">
    <input type="password" id="newAdminPass" placeholder="Password">
    <select id="newAdminRole">
        <option value="CEO">CEO (akses penuh)</option>
        <option value="admin team lavender">Admin Team Lavender</option>
    </select>
    <button class="btn-action" onclick="saveNewAdmin()"><i class="fas fa-plus"></i> Tambah Admin</button>
    <button class="btn-cancel" onclick="closeModal('addAdminModal')">Batal</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCgQHRWaYgIN3zvmD26Due6QisBC-fOl2M",
        authDomain: "database-1b7e5.firebaseapp.com",
        databaseURL: "https://database-1b7e5-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "database-1b7e5",
        storageBucket: "database-1b7e5.firebasestorage.app",
        messagingSenderId: "1076843649087",
        appId: "1:1076843649087:web:15b5222d2875d19571008a"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let isLoggedIn = false;
    let currentRole = null;

    function openOverlay() { document.getElementById('overlay').style.display = 'block'; }
    function closeOverlay() { document.getElementById('overlay').style.display = 'none'; }

    function openSidebar() {
        const s = document.getElementById('adminSidebar');
        s.classList.add('open');
        openOverlay();
    }

    function closeSidebar() {
        const s = document.getElementById('adminSidebar');
        s.classList.remove('open');
        s.style.display = 'none';
        closeOverlay();
    }

    function openModal(id) {
        document.getElementById(id).style.display = 'block';
        openOverlay();
    }

    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
        closeOverlay();
    }

    function closeLoginModal() { closeModal('loginModal'); }
    function closeEditModal() { closeModal('editModal'); }

    function checkSession() {
        const u = localStorage.getItem('adminUser');
        const r = localStorage.getItem('adminRole');
        if(u && r) {
            isLoggedIn = true;
            currentRole = r;
            document.getElementById('adminLoginBtn').style.display = 'none';
        } else {
            isLoggedIn = false;
            currentRole = null;
            document.getElementById('adminLoginBtn').style.display = '';
        }
    }

    function showLogin() {
        if(isLoggedIn) {
            applySidebarRole();
            openSidebar();
            loadAdminStats();
            loadAdminFiles();
            if(currentRole === 'CEO') loadAdminList();
        } else {
            openModal('loginModal');
        }
    }

    function applySidebarRole() {
        const isCEO = currentRole === 'CEO';
        document.getElementById('blockStats').style.display = isCEO ? 'block' : 'none';
        document.getElementById('blockAdminList').style.display = isCEO ? 'block' : 'none';
        document.getElementById('sidebarTitle').innerHTML = isCEO
            ? '<i class="fas fa-crown"></i> CEO PANEL'
            : '<i class="fas fa-users"></i> TEAM LAVENDER';
    }

    async function attemptLogin() {
        const u = document.getElementById('admU').value.trim();
        const p = document.getElementById('admP').value;
        if(!u || !p) { alert("Isi username dan password"); return; }

        try {
            const res = await fetch('admin.json');
            const master = await res.json();

            if(u === master.username && p === master.password) {
                setSession(u, master.role || 'CEO');
                closeModal('loginModal');
                applySidebarRole();
                openSidebar();
                loadAdminStats();
                loadAdminFiles();
                if(currentRole === 'CEO') loadAdminList();
                return;
            }

            const snap = await db.ref('admins').orderByChild('username').equalTo(u).once('value');
            if(snap.exists()) {
                let matched = false;
                snap.forEach(child => {
                    const d = child.val();
                    if(d.password === p) {
                        matched = true;
                        setSession(u, d.role);
                    }
                });
                if(matched) {
                    closeModal('loginModal');
                    applySidebarRole();
                    openSidebar();
                    loadAdminStats();
                    loadAdminFiles();
                    if(currentRole === 'CEO') loadAdminList();
                } else {
                    alert("Password salah bos");
                }
            } else {
                alert("mau jadi admin? dm pinooganteng");
            }
        } catch(e) {
            alert("Gagal verifikasi! Pastikan file admin.json tersedia.");
        }
    }

    function setSession(u, r) {
        localStorage.setItem('adminUser', u);
        localStorage.setItem('adminRole', r);
        isLoggedIn = true;
        currentRole = r;
        document.getElementById('adminLoginBtn').style.display = 'none';
    }

    function logout() {
        localStorage.removeItem('adminUser');
        localStorage.removeItem('adminRole');
        isLoggedIn = false;
        currentRole = null;
        document.getElementById('adminLoginBtn').style.display = '';
        closeSidebar();
        alert("logout done");
    }

    function loadAdminStats() {
        db.ref('monet_scripts').once('value', (snap) => {
            let dl = 0, lk = 0, fi = 0;
            snap.forEach(child => {
                const v = child.val();
                fi++;
                if(v.l && v.l !== '#') lk++;
                if(v.downloads) dl += v.downloads;
            });
            const sd = document.getElementById('statDownloads');
            const sl = document.getElementById('statLinks');
            const sf = document.getElementById('statFiles');
            if(sd) sd.innerText = dl;
            if(sl) sl.innerText = lk;
            if(sf) sf.innerText = fi;
        });
    }

    function loadAdminList() {
        const block = document.getElementById('blockAdminList');
        block.innerHTML = `
            <div class="section-title"><i class="fas fa-users-cog"></i> Kelola Admin</div>
            <button class="btn-action" onclick="openModal('addAdminModal')" style="width:100%; font-size:11px; padding:8px; margin-bottom:8px; justify-content:center;">
                <i class="fas fa-user-plus"></i> Add Admin
            </button>
            <div id="adminUserList"></div>
        `;
        db.ref('admins').on('value', (snap) => {
            const list = document.getElementById('adminUserList');
            if(!list) return;
            list.innerHTML = '';
            if(!snap.exists()) {
                list.innerHTML = '<p style="font-size:11px; color:#555; text-align:center; padding:8px 0;">Belum ada admin tambahan</p>';
                return;
            }
            snap.forEach(child => {
                const d = child.val();
                const isCEO = d.role === 'CEO';
                list.innerHTML += `
                    <div class="admin-list-item">
                        <h4>
                            <i class="fas fa-user"></i> ${escapeHtml(d.username)}
                            <span class="role-badge ${isCEO ? 'role-ceo' : 'role-team'}">${escapeHtml(d.role)}</span>
                        </h4>
                        <div class="item-actions">
                            <button class="btn-sm btn-delete" onclick="kickAdmin('${child.key}', '${escapeHtml(d.username)}')"><i class="fas fa-user-times"></i> Kick</button>
                        </div>
                    </div>
                `;
            });
        });
    }

    function saveNewAdmin() {
        const u = document.getElementById('newAdminUser').value.trim();
        const p = document.getElementById('newAdminPass').value;
        const r = document.getElementById('newAdminRole').value;
        if(!u || !p) { alert("Username dan password wajib diisi"); return; }
        db.ref('admins').push({ username: u, password: p, role: r }).then(() => {
            alert("Admin berhasil ditambahkan!");
            document.getElementById('newAdminUser').value = '';
            document.getElementById('newAdminPass').value = '';
            closeModal('addAdminModal');
        }).catch(err => alert("Error: " + err));
    }

    function kickAdmin(id, username) {
        if(confirm("Kick admin " + username + "?")) {
            db.ref('admins/' + id).remove().then(() => alert("Admin " + username + " dihapus!"));
        }
    }

    function uploadAdminShare() {
        const fileName = document.getElementById('shareFileName').value.trim();
        const link = document.getElementById('shareLink').value.trim();
        if(!fileName || !link) { alert("Nama file dan link wajib diisi"); return; }
        const data = {
            n: fileName,
            a: document.getElementById('shareAuthor').value || "",
            platform: document.getElementById('sharePlatform').value || "",
            c: document.getElementById('shareCommand').value || "",
            f: document.getElementById('shareFitur').value || "",
            l: link,
            i: document.getElementById('sharePreview').value || "",
            t: Date.now(),
            downloads: 0
        };
        db.ref('monet_scripts').push(data).then(() => {
            alert("File berhasil di-share!");
            ['shareFileName','shareAuthor','sharePlatform','shareCommand','shareFitur','shareLink','sharePreview'].forEach(id => {
                document.getElementById(id).value = '';
            });
            loadAdminFiles();
            if(currentRole === 'CEO') loadAdminStats();
        }).catch(err => alert("Error: " + err));
    }

    function loadAdminFiles() {
        db.ref('monet_scripts').orderByChild('t').on('value', (snap) => {
            const container = document.getElementById('adminFileList');
            if(!container) return;
            container.innerHTML = '';
            let items = [];
            snap.forEach(c => items.push({...c.val(), id: c.key}));
            if(items.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#555; font-size:11px; padding:8px 0;">Belum ada file</p>';
                return;
            }
            items.reverse().forEach(s => {
                container.innerHTML += `
                    <div class="admin-list-item">
                        <h4><i class="fas fa-file-alt"></i> ${escapeHtml(s.n)}</h4>
                        ${s.a ? `<p><i class="fas fa-user"></i> ${escapeHtml(s.a)}</p>` : ''}
                        ${s.c ? `<p><i class="fas fa-terminal"></i> ${escapeHtml(s.c)}</p>` : ''}
                        <p><i class="fas fa-download"></i> ${s.downloads || 0}x download</p>
                        <div class="item-actions">
                            <button class="btn-sm btn-edit" onclick="editFile('${s.id}', ${JSON.stringify(s).replace(/"/g,'&quot;')})"><i class="fas fa-edit"></i> Edit</button>
                            ${currentRole === 'CEO' ? `<button class="btn-sm btn-delete" onclick="deleteFile('${s.id}')"><i class="fas fa-trash"></i> Hapus</button>` : ''}
                            <a href="${s.l || '#'}" target="_blank"><button class="btn-sm btn-link"><i class="fas fa-link"></i> Link</button></a>
                        </div>
                    </div>
                `;
            });
        });
    }

    function editFile(id, data) {
        document.getElementById('editFileId').value = id;
        document.getElementById('editFileName').value = data.n || '';
        document.getElementById('editAuthor').value = data.a || '';
        document.getElementById('editPlatform').value = data.platform || '';
        document.getElementById('editCommand').value = data.c || '';
        document.getElementById('editFitur').value = data.f || '';
        document.getElementById('editLink').value = data.l || '';
        document.getElementById('editPreview').value = data.i || '';
        openModal('editModal');
    }

    function saveEdit() {
        const id = document.getElementById('editFileId').value;
        const updated = {
            n: document.getElementById('editFileName').value,
            a: document.getElementById('editAuthor').value,
            platform: document.getElementById('editPlatform').value,
            c: document.getElementById('editCommand').value,
            f: document.getElementById('editFitur').value,
            l: document.getElementById('editLink').value,
            i: document.getElementById('editPreview').value,
            t: Date.now(),
            downloads: 0
        };
        db.ref('monet_scripts/' + id).update(updated).then(() => {
            alert("File berhasil diupdate!");
            closeModal('editModal');
            loadAdminFiles();
        }).catch(err => alert("Error: " + err));
    }

    function deleteFile(id) {
        if(confirm("Yakin hapus file ini?")) {
            db.ref('monet_scripts/' + id).remove().then(() => {
                alert("File dihapus!");
                loadAdminFiles();
                loadAdminStats();
            });
        }
    }

    function updateDownloadCount(id, currentCount) {
        db.ref('monet_scripts/' + id).update({ downloads: (currentCount || 0) + 1 });
    }

    function filterScripts() {
        const input = document.getElementById('searchInput').value.toLowerCase();
        const cards = document.getElementsByClassName('script-card');
        for(let i = 0; i < cards.length; i++) {
            const title = cards[i].getElementsByTagName("h3")[0]?.innerText || '';
            cards[i].style.display = title.toLowerCase().includes(input) ? "" : "none";
        }
    }

    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    db.ref('monet_scripts').orderByChild('t').on('value', (snap) => {
        const container = document.getElementById('display-list');
        container.innerHTML = '';
        let items = [];
        snap.forEach(c => items.push({...c.val(), id: c.key}));

        if(items.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-box-open"></i>
                    <p>Belum ada file yang dishare</p>
                    <p style="font-size:11px; margin-top:8px;">Admin bisa login untuk share file pertama</p>
                </div>
            `;
            return;
        }

        items.reverse().forEach(s => {
            let metaHtml = '';
            if(s.a || s.platform || s.c) {
                metaHtml = '<div class="script-meta">';
                if(s.a) metaHtml += `<span><i class="fas fa-user"></i> ${escapeHtml(s.a)}</span>`;
                if(s.platform) metaHtml += `<span><i class="fas fa-mobile-alt"></i> ${escapeHtml(s.platform)}</span>`;
                if(s.c) metaHtml += `<span><i class="fas fa-terminal"></i> ${escapeHtml(s.c)}</span>`;
                metaHtml += '</div>';
            }
            container.innerHTML += `
                <div class="script-card">
                    <h3><i class="fas fa-file-alt"></i> ${escapeHtml(s.n)}</h3>
                    ${metaHtml}
                    ${s.f ? `<div class="script-desc">${escapeHtml(s.f).replace(/\n/g,'<br>')}</div>` : ''}
                    ${s.i ? `<img src="${s.i}" class="preview-img" loading="lazy" onerror="this.style.display='none'">` : ''}
                    <a href="${s.l || '#'}" target="_blank" onclick="updateDownloadCount('${s.id}', ${s.downloads || 0})">
                        <button class="btn-action"><i class="fas fa-download"></i> DOWNLOAD</button>
                    </a>
                    <div style="margin-top:8px; font-size:11px; color:#555;">
                        <i class="fas fa-chart-line"></i> ${s.downloads || 0} downloads
                    </div>
                </div>
            `;
        });
    });

    window.addEventListener('load', function() {
        checkSession();
        const video = document.querySelector('.red-video-badge video');
        if(video) video.play().catch(() => {});
    });
</script>
</body>
</html>
